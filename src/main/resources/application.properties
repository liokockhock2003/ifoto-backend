# Shared defaults — keep minimal

spring.application.name=ifoto-backend
server.port=8080

# Default profile (overridden by -Dspring-boot.run.profiles=dev|test|prod at runtime)
spring.profiles.active=dev

# Force Flyway to manage schema — Hibernate must NOT touch it
spring.jpa.hibernate.ddl-auto=none

# Flyway (will be enabled in all profiles)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration